name: Aether CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linters
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Verify runtime/ sync
        run: |
          bash bin/sync-to-runtime.sh
          if git diff --exit-code runtime/; then
            echo "runtime/ in sync with .aether/"
          else
            echo "ERROR: runtime/ out of sync"
            git diff --name-only runtime/
            exit 1
          fi

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  go:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Validate goreleaser config
        run: goreleaser check


      - name: Build
        run: go build ./cmd/aether

      - name: Run Go tests
        run: go test ./... -count=1 -timeout 300s

      - name: Parity tests
        run: go test ./cmd/... -run "TestParity|TestGoOnly" -count=1 -timeout 300s -v

      - name: Test summary
        if: always()
        run: |
          echo "Go tests: $(go test ./... -count=1 -timeout 300s -v 2>&1 | grep -c '--- PASS' || echo 'unknown') passed"
