name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (vX.Y.Z)'
        required: true
        type: string
      dry_run:
        description: 'Run validation and snapshot build without publishing release assets or npm'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-meta.outputs.release_tag }}
      release_version: ${{ steps.release-meta.outputs.release_version }}
      publish_release: ${{ steps.release-meta.outputs.publish_release }}
    steps:
      - name: Resolve release target
        id: release-meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            DRY_RUN="$INPUT_DRY_RUN"
          else
            TAG="$EVENT_TAG"
            DRY_RUN=false
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "expected a release tag like v1.0.19, got: $TAG" >&2
              exit 1
              ;;
          esac

          if [ "$DRY_RUN" = "true" ]; then
            PUBLISH_RELEASE=false
          else
            PUBLISH_RELEASE=true
          fi

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "publish_release=$PUBLISH_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ steps.release-meta.outputs.release_tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Verify release metadata matches tag
        run: |
          TAG_VERSION="${{ steps.release-meta.outputs.release_version }}"
          REPO_VERSION="$(python -c "import json; print(json.load(open('.aether/version.json'))['version'])")"
          NPM_VERSION="$(python -c "import json; print(json.load(open('npm/package.json'))['version'])")"
          test "$REPO_VERSION" = "$TAG_VERSION"
          test "$NPM_VERSION" = "$TAG_VERSION"

      - name: Validate goreleaser config
        run: goreleaser check

      - name: Build
        run: go build ./cmd/aether

      - name: Vet
        run: go vet ./...

      - name: Run Go tests
        run: go test ./... -count=1 -timeout 300s

      - name: Run Go tests with race detection
        run: go test ./... -race -count=1 -timeout 600s

      - name: Verify bundled narrator package
        run: |
          npm --prefix .aether/ts ci
          npm --prefix .aether/ts audit --package-lock-only --audit-level=low
          npm --prefix .aether/ts run typecheck
          printf '%s\n' '{"topic":"ceremony.build.spawn","payload":{"phase":1,"caste":"builder","name":"Mason-67","status":"starting"}}' | npm --prefix .aether/ts run narrate --silent

      - name: Build GoReleaser snapshot
        run: goreleaser build --snapshot --clean

      - name: Binary smoke test
        run: ./dist/Aether_linux_amd64_v1/Aether version

      - name: Run GoReleaser
        if: ${{ steps.release-meta.outputs.publish_release == 'true' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-bootstrap:
    needs: goreleaser
    if: ${{ secrets.NPM_TOKEN != '' && needs.goreleaser.outputs.publish_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.goreleaser.outputs.release_tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify release metadata matches tag
        run: |
          TAG_VERSION="${{ needs.goreleaser.outputs.release_version }}"
          REPO_VERSION="$(node -p "require('./.aether/version.json').version")"
          NPM_VERSION="$(node -p "require('./npm/package.json').version")"
          test "$REPO_VERSION" = "$TAG_VERSION"
          test "$NPM_VERSION" = "$TAG_VERSION"

      - name: Run npm bootstrap tests
        run: npm --prefix npm test

      - name: Publish npm bootstrap
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
