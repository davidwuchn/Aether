version: '1.0'
description: Default model assignments for Aether colony workers
profile: default

# Slot names resolve to concrete models. Castes reference slots, not model names.
model_slots:
  opus: glm-5
  sonnet: glm-5-turbo
  haiku: glm-4.5-air
  inherit: null  # uses parent model

worker_models:
  # Opus tier (10 castes) -- reasoning/analysis roles
  queen: opus
  archaeologist: opus
  route_setter: opus
  sage: opus
  tracker: opus
  auditor: opus
  gatekeeper: opus
  measurer: opus
  oracle: opus
  architect: opus

  # Sonnet tier (11 castes) -- execution/research roles
  builder: sonnet
  watcher: sonnet
  scout: sonnet
  chaos: sonnet
  probe: sonnet
  weaver: sonnet
  ambassador: sonnet
  surveyor_nest: sonnet
  surveyor_disciplines: sonnet
  surveyor_pathogens: sonnet
  surveyor_provisions: sonnet

  # Inherit tier (3 castes) -- uses parent's model
  chronicler: inherit
  includer: inherit
  keeper: inherit
model_metadata:
  glm-5:
    description: 'GLM-5 — deep reasoning, requires tight constraints for agent stability'
    provider: z_ai
    capabilities:
      - planning
      - coordination
      - complex_reasoning
      - long_context
    context_window: 200000
    speed: medium
    cost_tier: high
    best_for:
      - 'Bounded single-shot reasoning tasks'
      - 'Deep analysis with explicit stop conditions'
      - 'Tasks where you control the runtime tightly'
  glm-5-turbo:
    description: 'GLM-5-Turbo — fast, deterministic, agent-friendly (default for all workers)'
    provider: z_ai
    capabilities:
      - coding
      - planning
      - coordination
      - complex_reasoning
      - agentic_workflows
      - long_context
    context_window: 200000
    speed: fast
    cost_tier: high
    best_for:
      - 'Agent loops (deterministic output, clean termination)'
      - 'Coding and implementation tasks'
      - 'Orchestration and coordination'
      - 'Any task where looping = failure'
  glm-4.5-air:
    description: 'GLM-4.5-Air — lightweight tasks'
    provider: z_ai
    capabilities:
      - quick_tasks
      - classification
      - summarization
    context_window: 128000
    speed: fast
    cost_tier: low
    best_for:
      - 'Lightweight/haiku-tier tasks'
      - 'Quick classification or formatting'
task_routing:
  default_model: glm-5-turbo
  complexity_indicators:
    complex:
      keywords:
        - design
        - architecture
        - plan
        - coordinate
        - synthesize
        - strategize
        - optimize
      model: glm-5-turbo
    simple:
      keywords:
        - implement
        - code
        - refactor
        - write
        - create
      model: glm-5-turbo
    validate:
      keywords:
        - test
        - validate
        - verify
        - check
        - review
        - audit
      model: glm-5-turbo
proxy:
  endpoint: 'http://localhost:4000'
  auth_token: ${LITELLM_AUTH_TOKEN:-sk-litellm-local}
  health_check: 'http://localhost:4000/health'
