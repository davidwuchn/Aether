name: ant-discuss
description: "💬 Capture clarifications before planning through the Aether CLI runtime"
source_of_truth: "Use the Go `aether` CLI as the source of truth."
runtime:
  command: "AETHER_OUTPUT_MODE=visual aether discuss $ARGUMENTS"
guardrails:
  - "Do not write `pending-decisions.json`, `pheromones.json`, or `COLONY_STATE.json` by hand from this command spec."
  - "If the runtime returns clarification questions, present them honestly instead of inventing answers on the user's behalf."
  - "If docs and runtime disagree, runtime wins."
follow_up:
  persist_answer: "AETHER_OUTPUT_MODE=visual aether discuss --resolve <id> --answer \"<choice>\""
  settled: "If the runtime reports discussion_status: settled, route the user back to `aether plan`."
