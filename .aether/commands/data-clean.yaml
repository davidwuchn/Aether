name: ant-data-clean
description: "🧹 Scan and remove test artifacts from colony data files"
source_of_truth: "Use the Go `aether` CLI as the source of truth."
runtime:
  command: "AETHER_OUTPUT_MODE=visual aether data-clean $ARGUMENTS"
guardrails:
  - "Do not write colony state files, session files, or pheromone files by hand from this command spec."
  - "If docs and runtime disagree, runtime wins."
